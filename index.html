    <style>
        :root {
            --bg: #fff;
            --tx: #000;
            --hm: #999;
            --fw: 800px;
            --bc: #eee;
        }

        body {
            font-family: ui-monospace, monospace;
            margin: 0;
            background: var(--bg);
            color: var(--tx);
            line-height: 1.6;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--bc);
        }

        .lang-switch {
            cursor: pointer;
            font-size: .75rem;
            border: 1px solid var(--tx);
            padding: 2px 8px;
            margin-bottom: 1.5rem;
            transition: .2s;
        }

        .lang-switch:hover {
            background: var(--tx);
            color: var(--bg);
        }

        .nav-menu-container {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .nav-item {
            position: relative;
            padding: .5rem 1rem;
            cursor: pointer;
            font-size: .95rem;
        }

        .nav-item:hover {
            text-decoration: underline;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid var(--tx);
            background: var(--bg);
            min-width: 180px;
            z-index: 100;
            text-align: center;
        }

        .nav-item:hover .dropdown {
            display: block;
        }

        .dropdown-item {
            padding: .5rem;
            text-decoration: none;
            color: inherit;
            display: block;
            font-size: .85rem;
        }

        .dropdown-item:hover {
            background: #f8f8f8;
        }

        #hero-section {
            max-width: var(--fw);
            margin: 2rem auto;
            padding: 0 1.5rem;
            text-align: center;
        }

        #hero-art-frame {
            font-size: 8px;
            line-height: 1.1;
            white-space: pre;
            margin-bottom: 2rem;
            user-select: none;
            display: inline-block;
            max-width: 100%;
            overflow-x: auto;
        }

        .tab-container {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            padding-bottom: .5rem;
        }

        .tab-btn {
            cursor: pointer;
            padding: .2rem .5rem;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 1rem;
            color: var(--hm);
        }

        .tab-btn.active {
            color: var(--tx);
            font-weight: bold;
        }

        .tab-btn.active::before {
            content: "[ ";
        }

        .tab-btn.active::after {
            content: " ]";
        }

        #hero-content-wrapper {
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #hero-content {
            width: 100%;
            max-width: 600px;
            min-height: 160px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #text-intro {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--hm);
        }

        .content-line {
            display: block;
            margin-bottom: 1rem;
            unicode-bidi: embed;
        }

        .hero-cta-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 2rem;
        }

        .brutal-btn {
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--tx);
            background: var(--bg);
            padding: 12px 24px;
            border: 3px solid var(--tx);
            box-shadow: 5px 5px 0px var(--tx);
            transition: .1s;
            font-size: .9rem;
        }

        .brutal-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--tx);
        }

        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--tx);
        }

        footer {
            max-width: var(--fw);
            margin: 4rem auto 2rem;
            padding: 2rem 1.5rem 0;
            border-top: 1px solid var(--bc);
            text-align: center;
            font-size: .8rem;
            color: var(--hm);
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: .5rem;
        }

        .footer-links a {
            color: var(--hm);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .footer-links a:hover {
            color: var(--tx);
            border-bottom: 1px solid var(--tx);
        }

        .copyright a {
            color: inherit;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <script id="nav-data" type="text/plain">
- Decoding, 소음제거
    - Tech Guide, 컴맹탈출 가이드, https://blog.gitsam.com
    - Book Review, 서적·컬럼 독후감, https://blog.naver.com/primenumbersam

    - Math Training, 수학응용 훈련, https://sites.gitsam.com/
</script>
    <script id="hero-data" type="text/plain">
- WHO, 누구
    - Quant: Professional problem modeler in Math, 퀀트: 현실 문제 수학적 모델링 전문가
    - Hacker: Independent problem resolver in ICT, 해커: 정보통신기술 문제 독립적 해결가
    - Philosophy: Minimalism for Sustainability, 철학: 지속가능성을 위한 최소주의
- WHY, 왜
    - Adapt to the AX Era VibeOps, 인공지능전환시대 느좋코딩 적응
    - Cultivate Math & ICT Literacy, 수학 및 정보통신기술 문해력 함양
    - For the thinking reeds who walk the talk, 생각하고 言行一致하는 갈대들을 위해
- HOW, 어떻게
    - High-Logic but Low-Code, 생각은 깊게 구현은 쉽게
    - Priority of Global Structuring over Local Analysis, 국소적 분석을 넘어선 전역적 구조화 지향
    - Abstract Math for effectiveness; Structured Computing for efficiency, 효과를 위한 추상적 수학과 효율을 위한 구조적 컴퓨팅    
</script>
    <script>
        // To change default language to English, change curL = 1 to curL = 0
        let curL = 1, hTabs = [], aIdx = 0, tT = null;
        const $ = id => document.getElementById(id);

        function renderNav() {
            const c = $('nav-container'); c.innerHTML = '';
            $('nav-data').innerText.trim().split('\n').forEach(l => {
                const i = l.search(/\S/), [en, ko, url] = l.trim().substring(2).split(',').map(s => s.trim());
                const txt = curL ? ko : en;
                if (!i) {
                    const d = document.createElement('div'); d.className = 'nav-item';
                    d.innerHTML = `${txt}<div class="dropdown"></div>`;
                    c.appendChild(d);
                } else {
                    const a = document.createElement('a'); a.className = 'dropdown-item';
                    a.href = url || `#${en.toLowerCase().replace(/\s+/g, '-')}`; a.innerText = txt;
                    c.lastChild.querySelector('.dropdown').appendChild(a);
                }
            });
        }

        function parseHero() {
            hTabs = []; let t = null;
            $('hero-data').innerText.trim().split('\n').forEach(l => {
                const i = l.search(/\S/), [en, ko] = l.trim().substring(2).split(',').map(s => s.trim());
                if (!i) { if (t) hTabs.push(t); t = { title: { en, ko }, items: [] }; }
                else t.items.push({ en, ko });
            });
            if (t) hTabs.push(t);
        }

        function renderHero() {
            const h = $('tab-headers'); h.innerHTML = '';
            hTabs.forEach((t, i) => {
                const b = document.createElement('button'); b.className = `tab-btn ${i === aIdx ? 'active' : ''}`;
                b.innerText = curL ? t.title.ko : t.title.en;
                b.onclick = () => { if (aIdx === i) return; aIdx = i; renderHero(); renderContent(); };
                h.appendChild(b);
            });
        }

        async function renderContent() {
            const c = $('hero-content'); c.innerHTML = ''; if (tT) clearTimeout(tT);
            for (const item of hTabs[aIdx].items) {
                const txt = curL ? item.ko : item.en, l = document.createElement('div');
                l.className = 'content-line'; l.textContent = '> '; c.appendChild(l);
                await new Promise(r => {
                    let j = 0; function ty() {
                        if (j < txt.length) { l.textContent += txt[j++]; tT = setTimeout(ty, 20); } else r();
                    } ty();
                });
            }
        }

        // 일반 대중들이 성공팔이와 보그병신체에 호구잡히지 않는 기초적 문해력을 가지기 바라며 만든 실습 프로젝트
        
        function updateLiteracyText() {
            const introEl = $('text-intro'); // 해당 텍스트가 들어갈 element ID
            
            // 국문: 날카롭고 직관적인 '호구 방지' 메시지
            // 영문: 'Literacy as a Shield' (방패로서의 문해력) 철학 반영
            const msgKO = "딸깍부업구축: 성공팔이와 보그병신체에 호구잡히지 않는 기초 문해력 실습";
            const msgEN = "No-code Side-Hustle: Literacy against fake gurus and jargon scams";

            introEl.innerText = curL ? msgKO : msgEN;
        }

        function updateBtn() {
            $('btn-math').innerText = curL ? '딸깍 잔문작가' : 'Pundit-Mimic Bot';
            $('btn-math').href = 'https://primenumbersam.github.io/bot-publish/';
            $('btn-comp').innerText = curL ? '딸깍 팔이피플' : 'Stooge-Mimic Bot';
            $('btn-comp').href = 'https://primenumbersam.github.io/bot-promote/';
        }

        function toggleLang() { curL = curL ? 0 : 1; renderNav(); renderHero(); renderContent(); updateBtn(); updateLiteracyText(); }

        document.addEventListener('DOMContentLoaded', async () => {
            parseHero(); renderNav(); renderHero(); renderContent(); updateBtn(); updateLiteracyText();
            $('current-year').textContent = new Date().getFullYear();
            try { const r = await fetch('ascii-text-art.txt'); if (r.ok) $('hero-art-frame').textContent = await r.text(); } catch (e) { }
        });
    </script>
</body>
