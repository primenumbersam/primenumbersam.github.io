    <style>
        /* Design Tokens */
        :root {
            --bg: #fff;
            --tx: #000;
            --hm: #999;
            --fw: 800px;
            --bc: #eee
        }

        /* Base */
        body {
            font-family: ui-monospace, monospace;
            margin: 0;
            background: var(--bg);
            color: var(--tx);
            line-height: 1.6
        }

        /* Navigation */

            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--bc)
        }

        .lang-switch {

            font-size: .75rem;
            border: 1px solid var(--tx);
            padding: 2px 8px;
            margin-bottom: 1.5rem;
            transition: .2s
        }

        .lang-switch:hover {
            background: var(--tx);
            color: var(--bg)
        }

        .nav-menu-container {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%
        }

        .nav-item {
            position: relative;
            padding: .5rem 1rem;
            cursor: pointer;
            font-size: .95rem
        }

        .nav-item:hover {
            text-decoration: underline
        }

        /* Dropdown Menu */
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid var(--tx);
            background: var(--bg);
            min-width: 180px;
            z-index: 100;
            text-align: center
        }

        .nav-item:hover .dropdown {
            display: block
        }

        .dropdown-item {
            padding: .5rem;
            text-decoration: none;
            color: inherit;
            display: block;
            font-size: .85rem
        }

        .dropdown-item:hover {
            background: #f8f8f8
        }

        /* Hero Section */
        #hero-section {
            max-width: var(--fw);
            margin: 2rem auto;
            padding: 0 1.5rem;
            text-align: center
        }

        #hero-art-frame {
            font-size: 8px;
            line-height: 1.1;
            white-space: pre;
            margin-bottom: 2rem;
            user-select: none;
            display: inline-block;
            max-width: 100%;
            overflow-x: auto
        }

        /* Tabs Interface */
        .tab-container {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            padding-bottom: .5rem
        }

        .tab-btn {
            cursor: pointer;
            padding: .2rem .5rem;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 1rem;
            color: var(--hm)
        }

        .tab-btn.active {
            color: var(--tx);
            font-weight: bold
        }

        .tab-btn.active::before {
            content: "[ "
        }

        .tab-btn.active::after {
            content: " ]"
        }

        #hero-content-wrapper {
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: center
        }

        #hero-content {
            width: 100%;
            max-width: 600px;
            min-height: 160px;
            white-space: pre-wrap;
            word-break: break-all
        }

        #text-intro {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--hm)
        }

        .content-line {
            display: block;
            margin-bottom: 1rem;
            unicode-bidi: embed
        }

        /* CTA Buttons (Neo-Brutalism) */
        .hero-cta-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 2rem
        }

        .brutal-btn {
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--tx);
            background: var(--bg);
            padding: 12px 24px;
            border: 3px solid var(--tx);
            box-shadow: 5px 5px 0 var(--tx);
            transition: .1s;
            font-size: .9rem
        }

        .brutal-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 var(--tx)
        }

        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--tx)
        }

        /* Footer */
        footer {
            max-width: var(--fw);
            margin: 4rem auto 2rem;
            padding: 2rem 1.5rem 0;
            border-top: 1px solid var(--bc);
            text-align: center;
            font-size: .8rem;
            color: var(--hm)

    <!-- RAW Data for Hero Content -->
    <script id="hero-data" type="text/plain">
- WHO, 누구
    - Quant: Professional Math modeler, 퀀트: 현실 문제 수학적 모델링 전문가

    </script>

    <script>
        /**
         * STATE & HELPERS
         * curL: 0=EN, 1=KO (change to 0 for English default)
         */
        let curL = 1, hTabs = [], aIdx = 0, tT = null;
        const $ = id => document.getElementById(id);

        /* Shared line parser for raw data scripts */
        function parseLines(id, cb) {
            $(id).innerText.trim().split('\n').forEach(l => {
                cb(l.search(/\S/), l.trim().substring(2).split(',').map(s => s.trim()));
            });
        }

        /* Lang-aware text picker */
        const L = (en, ko) => curL ? ko : en;

        /** NAVIGATION: Parses #nav-data into hierarchical menu */
        function renderNav() {
            const c = $('nav-container'); c.innerHTML = '';
            parseLines('nav-data', (indent, [en, ko, url]) => {
                if (!indent) {
                    const d = document.createElement('div'); d.className = 'nav-item';
                    d.innerHTML = `${L(en, ko)}<div class="dropdown"></div>`;
                    c.appendChild(d);
                } else {
                    const a = document.createElement('a'); a.className = 'dropdown-item';
                    a.href = url || `#${en.toLowerCase().replace(/\s+/g, '-')}`;
                    a.innerText = L(en, ko);
                    c.lastChild.querySelector('.dropdown').appendChild(a);
                }
            });
        }

        /** HERO DATA: Converts #hero-data into structured tabs */
        function parseHero() {
            hTabs = []; let t = null;
            parseLines('hero-data', (indent, [en, ko]) => {
                if (!indent) { if (t) hTabs.push(t); t = { title: { en, ko }, items: [] }; }
                else t.items.push({ en, ko });
            });
            if (t) hTabs.push(t);
        }

        /** HERO TABS RENDERING */
        function renderHero() {
            const h = $('tab-headers'); h.innerHTML = '';
            hTabs.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = `tab-btn${i === aIdx ? ' active' : ''}`;
                b.innerText = L(t.title.en, t.title.ko);
                b.onclick = () => { if (aIdx !== i) { aIdx = i; renderHero(); renderContent(); } };
                h.appendChild(b);
            });
        }

        /** TYPING EFFECT */
        async function renderContent() {
            const c = $('hero-content'); c.innerHTML = ''; if (tT) clearTimeout(tT);
            for (const item of hTabs[aIdx].items) {
                const txt = L(item.en, item.ko), el = document.createElement('div');
                el.className = 'content-line'; el.textContent = '> '; c.appendChild(el);
                await new Promise(r => {
                    let j = 0;
                    (function ty() { j < txt.length ? (el.textContent += txt[j++], tT = setTimeout(ty, 20)) : r(); })();
                });
            }
        }

        /** Grifter-Mimic Study', '딸깍부업 흉내연구' */
        /** Pundit-Mimic Bot', '잔문작가 흉내도구' */
        function updateLiteracyText() {
            $('text-intro').innerText = L(
                "Anti-Scam Tools: Literacy Defense against Power Asymmetry",
                "호갱흑우탈출 도구: '불투명/권위/보그병신체' 방어 문해력 함양"
            );
        }
        function updateBtn() {
            $('btn-2').innerText = L('Open-Finance', '대마불사 투자');
            $('btn-2').href = 'https://finance.gitsam.com';
            $('btn-1').innerText = L('Open-Publish', '출판검증 표준');
            $('btn-1').href = 'https://publish.gitsam.com';
        }

        /** LANGUAGE TOGGLE */
        function toggleLang() { curL ^= 1; renderNav(); renderHero(); renderContent(); updateLiteracyText(); updateBtn(); }

        /** INITIALIZATION */
        document.addEventListener('DOMContentLoaded', async () => {
            parseHero(); renderNav(); renderHero(); renderContent(); updateBtn(); updateLiteracyText();
            $('current-year').textContent = new Date().getFullYear();
            try { const r = await fetch('ascii-text-art.txt'); if (r.ok) $('hero-art-frame').textContent = await r.text(); } catch (e) { }
        });
    </script>
